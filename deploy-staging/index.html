<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link id="favicon" rel="icon" type="image/png" href="/stagging/assets/logo-6036c57a.png" />
    <script>
      // Expose a helper to update the favicon dynamically from any JS/React code.
      // Usage: window.setFavicon('/path/to/icon.png')
      (function () {
        function setFavicon(url, type = 'image/png') {
          var link = document.getElementById('favicon');
          if (!link) {
            link = document.createElement('link');
            link.id = 'favicon';
            link.rel = 'icon';
            document.head.appendChild(link);
          }
          link.type = type;
          link.href = url;
        }
        // make available globally
        window.setFavicon = setFavicon;
        // Initialize to default logo (falls back to original if missing)
        try {
          setFavicon('assets/img/logo.png');
        } catch (e) {
          /* ignore */
        }
      })();
    </script>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Photography</title>
    <script>
      // attempt to update title ASAP by fetching settings before React loads
      (function() {
        try {
          fetch('/api/settings')
            .then(res => res.json())
            .then(s => {
              if (s && s.businessName) document.title = s.businessName;
            })
            .catch(() => {});
        } catch (e) {}
      })();
    </script>
